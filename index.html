<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Galactic Warrior</title>

  <!-- Open Graph (important pour Facebook/Pinterest) -->
  <meta property="og:title" content="Galactic Warrior">
  <meta property="og:description" content="Fight, survive, evolve.">
  <meta property="og:image" content="https://tonpseudo.github.io/galactic-warrior/preview.gif">
  <meta property="og:url" content="https://tonpseudo.github.io/galactic-warrior/">

  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    img {
      max-width: 90%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      background: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00e676;
    }
  </style>
</head>

<body>

  <h1>Galactic Warrior</h1>

  <!-- TON GIF -->
  <img src="images/warrior.gif" alt="Gameplay">

  <!-- BOUTON -->
  <a class="btn" href="https://play.google.com/store/apps/details?id=ton.jeu" target="_blank">
    ▶ Download on Play Store
  </a>
  <!-- BOUTON MASQUÉ ET COMMENTAIRE COMING SOON -->
<div class="coming-soon">Coming Soon</div>

<style>
  /* Masquer le bouton existant */
  .btn {
    display: none;
  }

  /* Texte Coming Soon avec effet */
  .coming-soon {
    margin-top: 20px;
    font-size: 24px;
    color: #00c853;
    font-weight: bold;
    text-transform: uppercase;
    animation: glow 1.5s infinite alternate, scaleUp 1.5s infinite alternate;
  }

  /* Glow effect */
  @keyframes glow {
    from { text-shadow: 0 0 5px #00c853, 0 0 10px #00c853; }
    to   { text-shadow: 0 0 20px #00e676, 0 0 40px #00e676; }
  }

  /* Slight scale animation */
  @keyframes scaleUp {
    from { transform: scale(1); }
    to   { transform: scale(1.1); }
  }
</style>
<style>
  /* Masquer le bouton existant */
  .btn {
    display: none;
  }

  /* Import d'une police spéciale depuis Google Fonts (ou tu peux remplacer par une autre) */
  @import url('https://fonts.googleapis.com/css2?family=Monofett&display=swap'); /* police "rare" style futuriste */

  /* Titre Galactic Warrior */
  h1 {
    font-family: 'Monofett', cursive; /* police rare */
    font-size: 60px;
    color:white; /* marron or */
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ffdd55, 0 0 30px #b8860b; /* effet glow doré */
    margin-bottom: 30px;
  }

  /* Texte Coming Soon */
  .coming-soon {
    font-family: 'Monofett', cursive;
    font-size: 32px;
    color: white;
    font-weight: bold;
    text-transform: uppercase;
    animation: glow 1.5s infinite alternate, scaleUp 1.5s infinite alternate;
    margin-top: 20px;
  }

  /* Glow effect */
  @keyframes glow {
    from { text-shadow: 0 0 5px #b8860b, 0 0 10px #ffd700; }
    to   { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffdd55; }
  }

  /* Slight scale animation */
  @keyframes scaleUp {
    from { transform: scale(1); }
    to   { transform: scale(1.1); }
  }
</style>

</body>
</html>
